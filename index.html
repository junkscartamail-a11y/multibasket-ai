<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MultiBasket AI Vision</title><meta name="theme-color" content="#06111f"><link rel="manifest" href="/manifest.json">
<style>
:root{--input:#07111f;--text:#f8fafc;--muted:#94a3b8;--border:#26364f;--accent:#38bdf8}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#020617,#07111f 50%,#050b14)}
.app{max-width:860px;margin:0 auto;padding:14px 12px 32px}.hero{background:linear-gradient(135deg,#0f172a,#1d4ed8 60%,#0891b2);border:1px solid rgba(255,255,255,.14);border-radius:26px;padding:18px;box-shadow:0 16px 44px rgba(0,0,0,.36);margin-bottom:12px}
h1{margin:0;font-size:25px}.hero p{margin:6px 0 0;color:#dbeafe;font-size:14px}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;background:rgba(56,189,248,.12);color:#bae6fd;border:1px solid rgba(56,189,248,.35);font-size:12px;font-weight:850;margin-top:10px}
.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.tab{border:1px solid var(--border);background:rgba(19,35,58,.95);color:var(--text);padding:11px 6px;border-radius:16px;font-weight:900;font-size:13px}.tab.active{background:var(--accent);color:#03111f;border-color:transparent}.hidden{display:none!important}
.card{background:rgba(13,23,38,.95);border:1px solid var(--border);border-radius:22px;padding:15px;margin-bottom:12px;box-shadow:0 8px 24px rgba(0,0,0,.22)}.quick{background:linear-gradient(135deg,rgba(56,189,248,.14),rgba(29,78,216,.12));border:1px solid rgba(56,189,248,.35)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media(max-width:560px){.grid{grid-template-columns:1fr}.tabs{grid-template-columns:repeat(2,1fr)}}
label{display:block;font-size:12px;color:#cbd5e1;font-weight:850;margin-bottom:6px}input,select,button{width:100%;border:1px solid var(--border);background:var(--input);color:var(--text);padding:12px;border-radius:15px;font-size:16px;outline:none}
button{background:var(--accent);color:#03111f;border:0;font-weight:1000}button.secondary{background:#1f2937;color:#f8fafc;border:1px solid var(--border)}button.red{background:#dc2626;color:white}
.result{text-align:center;border-radius:28px;padding:24px 14px;min-height:132px;display:flex;flex-direction:column;justify-content:center;align-items:center;margin-bottom:12px;border:1px solid rgba(255,255,255,.15);box-shadow:0 14px 40px rgba(0,0,0,.34)}
.res-blue{background:linear-gradient(135deg,#1e3a8a,#38bdf8)}.res-green{background:linear-gradient(135deg,#047857,#22c55e)}.res-red{background:linear-gradient(135deg,#991b1b,#ef4444)}.res-amber{background:linear-gradient(135deg,#92400e,#f59e0b)}
.main{font-size:36px;line-height:1;font-weight:1000}.stake{font-size:24px;font-weight:1000;margin-top:8px}.sub{font-size:13px;color:rgba(255,255,255,.88);margin-top:8px}.preview{width:100%;margin-top:10px;border-radius:18px;border:1px solid var(--border);display:none}.status,.small{font-size:13px;color:#bae6fd;margin-top:8px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.metric{background:#07111f;border:1px solid var(--border);border-radius:17px;padding:12px;text-align:center}.metric b{display:block;font-size:20px}.metric span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
</style></head>
<body><main class="app">
<section class="hero"><h1>đźŹ€ MultiBasket AI Vision</h1><p>Carica screenshot â†’ AI Vision â†’ OVER / UNDER / NO BET.</p><span class="badge">Render One-Click</span></section>
<nav class="tabs"><button class="tab active" data-tab="live1">LIVE 1</button><button class="tab" data-tab="live2">LIVE 2</button><button class="tab" data-tab="history">Storico</button><button class="tab" data-tab="settings">Opzioni</button></nav>
<section id="live1"></section><section id="live2" class="hidden"></section>
<section id="history" class="hidden"><div class="card"><b>Storico app</b><div id="historyList" class="small">Nessun match salvato.</div><button id="clearHistory" class="red" style="margin-top:10px">Cancella storico</button></div></section>
<section id="settings" class="hidden"><div class="card"><label>Bankroll predefinito (â‚¬)</label><input id="globalBankroll" type="number" value="25"></div><div class="card"><label>ModalitĂ  rischio</label><select id="riskMode"><option value="safe">Conservativa</option><option value="balanced" selected>Bilanciata</option><option value="aggressive">Aggressiva</option></select></div><div class="card">Server AI: <span id="health">controllo...</span></div><button id="saveSettings">Salva opzioni</button></section>
</main>
<script>
const $=id=>document.getElementById(id), key="mb_oneclick_v1";
const def={bankroll:25,risk:"balanced",history:[],live1:{},live2:{}};
let state=(()=>{try{return {...def,...JSON.parse(localStorage.getItem(key)||"{}")}}catch{return {...def}}})();
function save(){localStorage.setItem(key,JSON.stringify(state))}
function num(v){const x=parseFloat(String(v??"").replace(",","."));return Number.isFinite(x)?x:0}
function fmt(x,d=1){return Number.isFinite(x)?x.toFixed(d).replace(".",","):"-"}
function time(raw){raw=String(raw||"").replace(",",".");const m=raw.match(/^(\\d{1,2})[:.](\\d{2})$/);if(m)return parseInt(m[1])+parseInt(m[2])/60;return num(raw)}
function template(id){return `<div id="${id}_result" class="result res-blue"><div class="main">INSERISCI DATI</div><div class="stake"></div><div class="sub">Screenshot o manuale</div></div><div class="card quick"><label>đź“· Screenshot</label><input id="${id}_shot" type="file" accept="image/*"><img id="${id}_preview" class="preview"><div class="grid" style="margin-top:10px"><button id="${id}_ai">ANALIZZA CON AI</button><button id="${id}_calc" class="secondary">CALCOLA MANUALE</button></div><div id="${id}_status" class="status">Carica screenshot.</div></div><div class="card"><div class="grid"><div><label>Punti Casa</label><input id="${id}_home" type="number"></div><div><label>Punti Ospite</label><input id="${id}_away" type="number"></div><div><label>Quarto</label><select id="${id}_q"><option value="1">1Â°</option><option value="2">2Â°</option><option value="3">3Â°</option><option value="4">4Â°</option></select></div><div><label>Tempo rimasto</label><input id="${id}_left" placeholder="2:42"></div><div><label>Linea O/U</label><input id="${id}_line" type="number" step="0.5"></div><div><label>Bankroll â‚¬</label><input id="${id}_bankroll" type="number" value="${state.bankroll}"></div></div><div class="grid" style="margin-top:10px"><button id="${id}_save" class="secondary">SALVA STORICO</button><button id="${id}_clear" class="secondary">PULISCI</button></div></div><div class="card"><div class="metrics"><div class="metric"><b id="${id}_proj">-</b><span>Proiezione</span></div><div class="metric"><b id="${id}_marg">-</b><span>Margine</span></div><div class="metric"><b id="${id}_edge">-</b><span>AffidabilitĂ </span></div><div class="metric"><b id="${id}_stake">-</b><span>Puntata</span></div></div></div>`}
$("live1").innerHTML=template("l1");$("live2").innerHTML=template("l2");
function thresholds(){if(state.risk==="safe")return{early:10,normal:8,minEdge:68,maxPct:.05};if(state.risk==="aggressive")return{early:7,normal:5,minEdge:52,maxPct:.10};return{early:8,normal:6,minEdge:58,maxPct:.08}}
function calc(id){const d={h:num($(`${id}_home`).value),a:num($(`${id}_away`).value),q:parseInt($(`${id}_q`).value||"1"),left:time($(`${id}_left`).value),line:num($(`${id}_line`).value),bank:num($(`${id}_bankroll`).value)};const tot=d.h+d.a,played=Math.max(.1,(d.q-1)*10+(10-d.left)),proj=tot/played*40,marg=proj-d.line,abs=Math.abs(marg),t=thresholds(),thr=played<8?t.early:t.normal;let pick="NO BET";if(tot>0&&d.line>0&&d.left>=0&&d.left<=10&&played>=2.5){if(marg>=thr)pick=`OVER ${fmt(d.line)}`;if(marg<=-thr)pick=`UNDER ${fmt(d.line)}`}let edge=0;if(pick!=="NO BET")edge=Math.round(Math.min(100,Math.min(60,abs*4)+Math.min(25,played/40*32)+(d.bank>=20?15:8)));let stake=0;if(pick!=="NO BET"&&edge>=t.minEdge){let pct=.025;if(edge>=85)pct=.07;else if(edge>=75)pct=.05;else if(edge>=65)pct=.035;pct=Math.min(pct,t.maxPct);if(played<8)pct*=.75;stake=Math.round(d.bank*pct);stake=Math.max(1,stake);stake=Math.min(stake,Math.max(1,Math.round(d.bank*t.maxPct)))}else pick="NO BET";$(`${id}_proj`).textContent=fmt(proj);$(`${id}_marg`).textContent=fmt(marg);$(`${id}_edge`).textContent=edge+"/100";$(`${id}_stake`).textContent=stake+" â‚¬";const box=$(`${id}_result`);if(pick==="NO BET"){box.className="result res-red";box.querySelector(".main").textContent="NO BET";box.querySelector(".stake").textContent="0 â‚¬";box.querySelector(".sub").textContent="Margine insufficiente"}else{box.className=edge>=75?"result res-green":"result res-amber";box.querySelector(".main").textContent=pick;box.querySelector(".stake").textContent=stake+" â‚¬";box.querySelector(".sub").textContent=`AffidabilitĂ  ${edge}/100 Â· bankroll ${fmt(d.bank,2)} â‚¬`}state[id==="l1"?"live1":"live2"]={...d,pick,stake,edge,proj,marg,at:new Date().toLocaleString("it-IT")};save();return state[id==="l1"?"live1":"live2"]}
async function ai(id){const file=$(`${id}_shot`).files?.[0],s=$(`${id}_status`);if(!file){s.textContent="Carica prima uno screenshot.";return}const fd=new FormData();fd.append("image",file);s.textContent="Analisi AI in corso...";try{const r=await fetch("/api/analyze",{method:"POST",body:fd});if(!r.ok)throw new Error(await r.text());const data=await r.json();const e=data.extracted||{};$(`${id}_home`).value=e.homeScore??"";$(`${id}_away`).value=e.awayScore??"";$(`${id}_q`).value=e.quarter??"1";$(`${id}_left`).value=e.timeRemaining??"";$(`${id}_line`).value=e.lineOU??"";s.textContent=`AI completata Â· confidenza ${e.confidence??"-"}/100`;calc(id)}catch(err){s.textContent="Errore AI. Controlla OPENAI_API_KEY su Render."}}
function init(id){["home","away","q","left","line","bankroll"].forEach(f=>{$(`${id}_${f}`).addEventListener("input",()=>calc(id));$(`${id}_${f}`).addEventListener("change",()=>calc(id))});$(`${id}_calc`).addEventListener("click",()=>calc(id));$(`${id}_ai`).addEventListener("click",()=>ai(id));$(`${id}_save`).addEventListener("click",()=>{const r=calc(id);state.history.unshift(r);save();renderHistory()});$(`${id}_clear`).addEventListener("click",()=>{["home","away","left","line"].forEach(f=>$(`${id}_${f}`).value="");calc(id)});$(`${id}_shot`).addEventListener("change",()=>{const file=$(`${id}_shot`).files?.[0];if(!file)return;const p=$(`${id}_preview`);p.src=URL.createObjectURL(file);p.style.display="block";$(`${id}_status`).textContent="Screenshot caricato. Premi ANALIZZA CON AI."});calc(id)}
function renderHistory(){const l=$("historyList");if(!state.history.length){l.textContent="Nessun match salvato.";return}l.innerHTML=state.history.map(x=>`<div style="border-bottom:1px solid #26364f;padding:10px 0"><b>${x.pick}</b> Â· ${x.stake} â‚¬ Â· ${x.edge}/100<br><span class="small">${x.at}</span></div>`).join("")}
document.querySelectorAll(".tab").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active");["live1","live2","history","settings"].forEach(s=>$(s).classList.add("hidden"));$(b.dataset.tab).classList.remove("hidden");renderHistory()}));
$("globalBankroll").value=state.bankroll;$("riskMode").value=state.risk;$("saveSettings").addEventListener("click",()=>{state.bankroll=num($("globalBankroll").value)||25;state.risk=$("riskMode").value;save();});$("clearHistory").addEventListener("click",()=>{state.history=[];save();renderHistory()});init("l1");init("l2");renderHistory();fetch("/api/health").then(()=>{$("health").textContent="attivo"}).catch(()=>{$("health").textContent="non attivo"});
if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});
</script></body></html>
